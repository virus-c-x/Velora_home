<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>LUXE — Premium Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ============================================
   DESIGN TOKENS
   ============================================ */
:root{
  --ink:#0a0a0f;
  --ink2:#11131e;
  --ink3:#181c2e;
  --g1:rgba(255,255,255,0.03);
  --g2:rgba(255,255,255,0.06);
  --g3:rgba(255,255,255,0.10);
  --g4:rgba(255,255,255,0.16);
  --edge:rgba(255,255,255,0.08);
  --edge2:rgba(255,255,255,0.14);
  --edge3:rgba(255,255,255,0.24);
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --gold3:#f5e0a0;
  --gold-glow:rgba(201,168,76,0.18);
  --gold-glow2:rgba(201,168,76,0.35);
  --emerald:#22c97a;
  --amber:#f5a623;
  --rose:#f03e5c;
  --sky:#4facfe;
  --cream:#f5f0e8;
  --text:#e8eaf0;
  --text2:#8a90a8;
  --text3:#4a5068;
  --r:18px;--r2:12px;--r3:8px;--r4:6px;
  --fs:'Jost',sans-serif;
  --fd:'Cormorant Garamond',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--ink);color:var(--text);font-family:var(--fs);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::selection{background:var(--gold-glow2);color:var(--gold3)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:99px}

/* ============================================
   KEYFRAMES
   ============================================ */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(-110%)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleUp{from{opacity:0;transform:scale(0.88) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.95)}}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(80px,-60px) scale(1.15)}70%{transform:translate(-50px,40px) scale(0.88)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-100px,60px) scale(0.9)}70%{transform:translate(60px,-80px) scale(1.12)}}
@keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,50px) scale(1.08)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes heroReveal{0%{opacity:0;filter:blur(8px);transform:translateY(24px)}100%{opacity:1;filter:blur(0);transform:translateY(0)}}
@keyframes badgePop{0%{transform:scale(0) rotate(-18deg);opacity:0}65%{transform:scale(1.2) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes borderRun{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 var(--gold-glow)}60%{box-shadow:0 0 32px 8px var(--gold-glow)}}
@keyframes overlayIn{from{opacity:0;backdrop-filter:blur(0px)}to{opacity:1;backdrop-filter:blur(12px)}}
@keyframes counterUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ============================================
   GLASS SYSTEM
   ============================================ */
.glass{
  background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.02) 100%);
  border:1px solid var(--edge2);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
}
.glass-dark{
  background:rgba(10,10,15,0.82);
  border:1px solid var(--edge2);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
}
.glass-card{
  background:linear-gradient(145deg,rgba(255,255,255,0.065) 0%,rgba(255,255,255,0.015) 60%,rgba(201,168,76,0.03) 100%);
  border:1px solid var(--edge2);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:background .3s,border-color .3s,transform .35s cubic-bezier(.2,.8,.3,1),box-shadow .35s;
}
.glass-card:hover{
  background:linear-gradient(145deg,rgba(255,255,255,0.09) 0%,rgba(255,255,255,0.03) 60%,rgba(201,168,76,0.05) 100%);
  border-color:rgba(201,168,76,0.22);
}

/* ============================================
   BUTTONS
   ============================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:7px;padding:12px 24px;border-radius:var(--r2);border:none;
  cursor:pointer;font-family:var(--fs);font-size:14px;font-weight:600;
  transition:all .24s cubic-bezier(.2,.8,.3,1);text-decoration:none;
  white-space:nowrap;position:relative;overflow:hidden;letter-spacing:.3px;
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.14),transparent 60%);opacity:0;transition:opacity .2s}
.btn:hover::before{opacity:1}
.btn-gold{
  background:linear-gradient(135deg,var(--gold) 0%,#b8933e 50%,var(--gold2) 100%);
  background-size:200% 200%;
  color:#1a1200;font-weight:700;
  box-shadow:0 4px 24px var(--gold-glow2),inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 36px var(--gold-glow2),0 0 0 1px rgba(201,168,76,0.4),inset 0 1px 0 rgba(255,255,255,0.3)}
.btn-gold:active{transform:translateY(0)}
.btn-outline{
  background:transparent;color:var(--text);
  border:1px solid var(--edge2);
}
.btn-outline:hover{background:var(--g2);border-color:var(--edge3);transform:translateY(-1px)}
.btn-ghost{background:var(--g2);color:var(--text);border:1px solid var(--edge2)}
.btn-ghost:hover{background:var(--g3);border-color:var(--edge3)}
.btn-danger{background:rgba(240,62,92,0.1);color:#fb7185;border:1px solid rgba(240,62,92,0.25)}
.btn-danger:hover{background:rgba(240,62,92,0.2)}
.btn-wa{
  background:linear-gradient(135deg,#25d366 0%,#128c4e 100%);
  color:#fff;font-weight:800;font-size:16px;
  padding:18px 32px;border-radius:var(--r);width:100%;
  box-shadow:0 6px 32px rgba(37,211,102,0.3);
  letter-spacing:.3px;
}
.btn-wa:hover{transform:translateY(-3px);box-shadow:0 14px 48px rgba(37,211,102,0.45)}
.btn-wa:active{transform:translateY(-1px)}
.btn-wa.off{opacity:.4;pointer-events:none}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:var(--r3)}
.btn-xs{padding:5px 10px;font-size:12px;border-radius:var(--r4)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ============================================
   FORM ELEMENTS
   ============================================ */
.inp,.ta,.sel{
  width:100%;padding:12px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--edge2);border-radius:var(--r2);
  color:var(--text);font-family:var(--fs);font-size:14px;
  transition:all .22s;outline:none;
}
.inp:focus,.ta:focus,.sel:focus{border-color:var(--gold);background:rgba(201,168,76,0.04);box-shadow:0 0 0 3px rgba(201,168,76,0.1)}
.inp::placeholder,.ta::placeholder{color:var(--text3)}
.ta{resize:vertical;min-height:88px;line-height:1.7}
.sel option{background:#181c2e;color:var(--text)}
.field{display:flex;flex-direction:column;gap:7px}
.field>label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}

/* TOGGLE */
.tog{position:relative;display:inline-block;width:48px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-s{position:absolute;inset:0;background:var(--ink3);border-radius:99px;cursor:pointer;transition:.25s;border:1px solid var(--edge2)}
.tog-s::before{content:'';position:absolute;width:20px;height:20px;left:2px;top:2px;background:var(--text2);border-radius:50%;transition:.25s;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.tog input:checked+.tog-s{background:linear-gradient(135deg,var(--gold),#b8933e);border-color:var(--gold)}
.tog input:checked+.tog-s::before{transform:translateX(22px);background:#1a1200}

/* ============================================
   STATUS TAGS
   ============================================ */
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.3px}
.t-green{background:rgba(34,201,122,.11);color:#4ade80;border:1px solid rgba(34,201,122,.25)}
.t-yellow{background:rgba(245,166,35,.11);color:#fbbf24;border:1px solid rgba(245,166,35,.25)}
.t-red{background:rgba(240,62,92,.11);color:#fb7185;border:1px solid rgba(240,62,92,.25)}
.t-gold{background:rgba(201,168,76,.1);color:var(--gold2);border:1px solid rgba(201,168,76,.25)}
.t-blue{background:rgba(79,172,254,.1);color:#7dd3fc;border:1px solid rgba(79,172,254,.25)}
.t-dev{background:rgba(168,85,247,.1);color:#d8b4fe;border:1px solid rgba(168,85,247,.25)}
.t-own{background:rgba(245,166,35,.1);color:#fbbf24;border:1px solid rgba(245,166,35,.25)}
.t-adm{background:rgba(79,172,254,.1);color:#7dd3fc;border:1px solid rgba(79,172,254,.25)}
.sdot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ============================================
   HEADER
   ============================================ */
.header{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:68px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(16px,4vw,48px);
  background:rgba(10,10,15,0.55);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border-bottom:1px solid rgba(255,255,255,0);
  transition:background .4s,border-color .4s;
}
.header.scrolled{background:rgba(10,10,15,0.88);border-bottom-color:var(--edge)}
.header-logo{display:flex;align-items:center;gap:12px;text-decoration:none;cursor:pointer}
.logo-icon{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold) 0%,#7a5e20 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:20px;font-weight:700;color:#1a1200;font-style:italic;
  box-shadow:0 4px 20px var(--gold-glow2);
}
.logo-name{font-family:var(--fd);font-size:22px;font-weight:600;letter-spacing:.5px;color:var(--text)}
.logo-name em{color:var(--gold2);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px}

/* LANGUAGE SWITCHER */
.lang-wrap{display:flex;background:rgba(255,255,255,0.04);border:1px solid var(--edge);border-radius:var(--r2);padding:3px;gap:2px}
.lang-btn{padding:5px 12px;border-radius:var(--r3);background:transparent;border:none;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--fs);letter-spacing:.4px}
.lang-btn.active{background:linear-gradient(135deg,var(--gold),#b8933e);color:#1a1200}
.lang-btn:hover:not(.active){color:var(--text);background:var(--g2)}

/* ADMIN TRIGGER */
.admin-trigger{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px;border-radius:var(--r2);
  background:var(--g2);border:1px solid var(--edge2);
  color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:var(--fs);
}
.admin-trigger:hover{background:var(--g3);border-color:var(--edge3)}
.admin-trigger .gold-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold-glow2);flex-shrink:0}

/* ADMIN DROPDOWN */
.adrop-wrap{position:relative}
.adrop{
  position:absolute;top:calc(100%+12px);right:0;
  min-width:240px;
  background:rgba(11,13,20,0.97);
  border:1px solid var(--edge2);border-radius:var(--r);
  overflow:hidden;
  box-shadow:0 28px 72px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,0.07);
  animation:scaleUp .22s cubic-bezier(.2,.8,.3,1);
  transform-origin:top right;
}
.adrop-head{padding:16px 18px;border-bottom:1px solid var(--edge);background:rgba(201,168,76,0.04)}
.adrop-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 18px;color:var(--text2);
  cursor:pointer;font-size:13.5px;font-weight:500;transition:all .15s;
}
.adrop-item:hover{background:var(--g2);color:var(--text)}
.adrop-item.danger{color:#fb7185}
.adrop-item.danger:hover{background:rgba(240,62,92,0.08)}
.adrop-sep{height:1px;background:var(--edge);margin:4px 0}

/* ============================================
   HERO
   ============================================ */
.hero{
  position:relative;min-height:100svh;
  display:flex;align-items:center;overflow:hidden;
  padding-top:68px;
}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg-img{width:100%;height:100%;object-fit:cover;filter:brightness(.25) saturate(1.3)}
.hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to bottom,rgba(10,10,15,.6) 0%,rgba(10,10,15,.0) 35%,rgba(10,10,15,.88) 100%),
    linear-gradient(to right,rgba(10,10,15,.5) 0%,transparent 70%),
    radial-gradient(ellipse at 20% 60%,rgba(201,168,76,.06) 0%,transparent 55%);
}
.hero-grain{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:1}
.orb-1{width:700px;height:700px;top:-200px;left:-150px;background:radial-gradient(circle,rgba(201,168,76,.1),transparent 65%);animation:drift1 14s ease-in-out infinite}
.orb-2{width:600px;height:600px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(79,172,254,.06),transparent 65%);animation:drift2 18s ease-in-out infinite}
.orb-3{width:400px;height:400px;top:40%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(201,168,76,.04),transparent 65%);animation:drift3 22s ease-in-out infinite}
.hero-content{position:relative;z-index:2;width:100%;max-width:1300px;margin:0 auto;padding:clamp(40px,8vh,120px) clamp(16px,5vw,60px)}
.hero-label{
  display:inline-flex;align-items:center;gap:10px;
  padding:7px 16px;border-radius:99px;
  background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.22);
  font-size:11px;font-weight:700;color:var(--gold2);
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:24px;
  animation:heroReveal .7s .1s both;
}
.hero-label-line{width:24px;height:1px;background:linear-gradient(to right,var(--gold),transparent)}
.hero-h1{
  font-family:var(--fd);font-weight:300;
  font-size:clamp(44px,8vw,96px);
  line-height:1.04;color:var(--cream);
  margin-bottom:24px;
  animation:heroReveal .9s .2s both;
  letter-spacing:-.5px;
}
.hero-h1 strong{font-weight:700;color:var(--gold2);display:block}
.hero-h1 em{font-style:italic;color:rgba(245,240,232,0.7)}
.hero-sub{
  font-size:clamp(15px,2vw,19px);color:var(--text2);
  max-width:500px;line-height:1.8;margin-bottom:40px;
  animation:heroReveal .7s .38s both;font-weight:300;
}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;animation:heroReveal .7s .5s both}
.hero-stats{
  display:flex;gap:clamp(20px,4vw,56px);
  margin-top:clamp(48px,7vh,96px);
  animation:heroReveal .7s .65s both;
  flex-wrap:wrap;
}
.hero-stat{display:flex;flex-direction:column;gap:4px}
.hero-stat-n{
  font-family:var(--fd);font-weight:700;
  font-size:clamp(28px,4vw,44px);
  color:var(--cream);line-height:1;
  overflow:hidden;
}
.hero-stat-n span{display:block;animation:counterUp .6s cubic-bezier(.2,.8,.3,1) both}
.hero-stat-l{font-size:12px;color:var(--text3);letter-spacing:.6px;font-weight:500;text-transform:uppercase}
.hero-vdiv{width:1px;background:linear-gradient(to bottom,transparent,var(--edge2),transparent);align-self:stretch}
.scroll-hint{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;z-index:2;
  animation:fadeIn 1s 1.4s both;cursor:pointer;
}
.scroll-text{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.scroll-track{width:1px;height:48px;background:linear-gradient(to bottom,var(--gold2),transparent);animation:pulse 2.5s ease-in-out infinite}

/* ============================================
   MARQUEE STRIP
   ============================================ */
.marquee-wrap{
  overflow:hidden;padding:14px 0;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.04),rgba(201,168,76,0.04),transparent);
  border-top:1px solid rgba(201,168,76,0.1);
  border-bottom:1px solid rgba(201,168,76,0.1);
}
.marquee-inner{display:flex;gap:48px;white-space:nowrap;animation:marquee 28s linear infinite}
.m-item{
  display:flex;align-items:center;gap:10px;
  font-size:11px;font-weight:700;color:var(--text3);
  letter-spacing:1.2px;text-transform:uppercase;
}
.m-gem{
  font-size:13px;color:var(--gold);opacity:0.6;
}

/* ============================================
   CATALOG SECTION
   ============================================ */
.catalog{max-width:1300px;margin:0 auto;padding:clamp(48px,6vw,96px) clamp(16px,5vw,60px)}
.catalog-header{margin-bottom:clamp(28px,4vw,56px)}
.section-eyebrow{
  display:flex;align-items:center;gap:10px;
  font-size:11px;font-weight:700;color:var(--gold2);
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:14px;
}
.eyebrow-line{flex:1;max-width:40px;height:1px;background:linear-gradient(to right,var(--gold2),transparent)}
.section-title{
  font-family:var(--fd);font-weight:300;
  font-size:clamp(30px,4vw,52px);
  line-height:1.1;color:var(--cream);
}
.section-title strong{font-weight:700;color:var(--gold2)}
.section-count{font-size:13px;color:var(--text3);margin-top:8px;font-weight:400}

/* FILTER BAR */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  padding:16px 20px;border-radius:var(--r);margin-bottom:clamp(24px,3vw,40px);
  background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
  border:1px solid var(--edge);
}
.search-box{flex:1;min-width:200px;position:relative}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;flex-shrink:0}
.search-box .inp{padding-left:44px}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{
  padding:8px 18px;border-radius:99px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .22s;
  background:var(--g1);border:1px solid var(--edge);color:var(--text2);
  letter-spacing:.3px;
}
.pill.active{
  background:rgba(201,168,76,0.1);
  border-color:rgba(201,168,76,0.3);
  color:var(--gold2);
}
.pill:hover:not(.active){border-color:var(--edge2);color:var(--text)}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(290px,100%),1fr));gap:clamp(12px,2vw,20px)}

/* ============================================
   PRODUCT CARD
   ============================================ */
.pcard{
  border-radius:var(--r);overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
  background:linear-gradient(145deg,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.02) 60%,rgba(201,168,76,0.025) 100%);

.pc-cat{font-size:10px;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:1px}
.pc-name{
  font-family:var(--fd);font-weight:600;

.pc-code{font-size:11px;color:var(--text3);letter-spacing:.3px}

}

  box-shadow:-36px 0 100px rgba(0,0,0,.7);

}

  position:sticky;top:0;z-index:10;
  padding:18px 22px;
  background:rgba(10,10,17,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--edge);
  display:flex;justify-content:space-between;align-items:center;
}
.drawer-title{font-family:var(--fd);font-weight:600;font-size:17px;max-width:82%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--cream)}

.d-thumb{

.drawer-cat{font-size:11px;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.drawer-name{font-family:var(--fd);font-weight:600;font-size:clamp(24px,4vw,32px);line-height:1.2;color:var(--cream)}
.drawer-desc{color:var(--text2);line-height:1.82;font-size:14.5px;font-weight:300}
.drawer-price-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.drawer-price{font-weight:900;font-size:clamp(30px,5vw,42px);color:var(--gold2);font-family:var(--fs)}

.drawer-gold-line{height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,0.25),transparent);margin:2px 0}

/* ============================================

.login-logo-wrap{

}
.login-logo{

  font-family:var(--fd);font-size:30px;font-weight:700;color:#1a1200;font-style:italic;
  box-shadow:0 10px 40px var(--gold-glow2),0 0 0 1px rgba(255,255,255,0.07);

}
.login-heading{font-family:var(--fd);font-size:30px;font-weight:600;color:var(--cream);margin-bottom:6px;text-align:center}
.login-sub{color:var(--text2);text-align:center;font-size:14px}
.login-form{

  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 36px 80px rgba(0,0,0,.55);
}
.error-box{
  background:rgba(240,62,92,0.08);border:1px solid rgba(240,62,92,0.25);

}

  background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.15);

}

.sidebar{

.sidebar-top{padding:24px 20px 20px;border-bottom:1px solid var(--edge)}

.sb-section{padding:18px 20px 6px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.4px}

.sb-item:hover{background:rgba(255,255,255,0.03);color:var(--text)}

.sidebar-foot{margin-top:auto;padding:18px 20px;border-top:1px solid var(--edge)}
.admin-main{flex:1;min-width:0;overflow:hidden}
.admin-inner{padding:clamp(20px,3vw,40px);max-width:1100px}

.tbl-rtl th,.tbl-rtl td{text-align:right}

.modal-gold-bar{
  height:2px;background:linear-gradient(to right,var(--gold),transparent);

.spin{border:2.5px solid var(--edge2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

.ithumb{width:54px;height:54px;object-fit:cover;border-radius:var(--r2);border:1px solid var(--edge2);flex-shrink:0}

/* DISCOUNT ROW */

  border:1px solid rgba(201,168,76,0.14);
  border-radius:var(--r2);padding:14px 16px;

.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.mb4{margin-bottom:16px}.mb6{margin-bottom:24px}.mt4{margin-top:16px}
.row{display:flex;align-items:center}
.between{display:flex;align-items:center;justify-content:space-between}
.end{display:flex;justify-content:flex-end;gap:10px}
.gap2{gap:8px}.gap3{gap:12px}

/* ============================================
   RESPONSIVE
   ============================================ */
@media(max-width:960px){
  .admin-wrap{flex-direction:column}

  .sb-item{padding:9px 14px;border-left:none!important;border-right:none!important;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
  .sb-item.active{border-bottom-color:var(--gold);border-left:none!important;background:transparent}
  .admin-inner{padding:18px 16px}
}
@media(max-width:680px){
  .g2{grid-template-columns:1fr}
  .pgrid{grid-template-columns:repeat(2,1fr);gap:10px}
  .hero-ctas .btn:nth-child(2){display:none}
  .hero-vdiv{display:none}
  .hero-stats{gap:20px}
  .d-features{grid-template-columns:1fr}
  .scroll-hint{display:none}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .filter-bar{padding:12px}
}
@media(max-width:400px){
  .pgrid{grid-template-columns:1fr}
}

/* ── MOCK DB ───────────────────────────────── */
class DB{
  constructor(){
    this._p=[...PRODS];this._s={...DEF_ST};this._c=[...DEF_CATS];
    this._us={"dev@luxe.com":{role:"developer",name:"Dev"},"owner@luxe.com":{role:"owner",name:"Owner"},"admin@luxe.com":{role:"admin",name:"Admin"}};
    this._u=null;this._l={};
  }
  _emit(ch){(this._l[ch]||[]).forEach(f=>f())}
  _on(ch,f){if(!this._l[ch])this._l[ch]=[];this._l[ch].push(f);return()=>{this._l[ch]=this._l[ch].filter(x=>x!==f)}}
  async signIn(em,pw){
    await new Promise(r=>setTimeout(r,700));
    const u=this._us[em];
    if(!u||pw!=="demo1234")throw new Error("Wrong credentials — try demo1234");
    this._u={email:em,...u};return this._u;
  }
  signOut(){this._u=null}
  getUser(){return this._u}
  onProducts(f){f([...this._p]);return this._on("p",()=>f([...this._p]))}
  async addProduct(d){const p={id:"px"+Date.now(),...d};this._p.push(p);this._emit("p");return p}
  async updProduct(id,d){const i=this._p.findIndex(x=>x.id===id);if(i!==-1){this._p[i]={...this._p[i],...d};this._emit("p")}}
  async delProduct(id){this._p=this._p.filter(x=>x.id!==id);this._emit("p")}
  onCats(f){f([...this._c]);return this._on("c",()=>f([...this._c]))}
  async addCat(n){if(!this._c.includes(n)){this._c.push(n);this._emit("c")}}
  async delCat(n){this._c=this._c.filter(x=>x!==n);this._emit("c")}
  onSettings(f){f({...this._s});return this._on("s",()=>f({...this._s}))}
  async updSettings(d){this._s={...this._s,...d};this._emit("s")}
  async uploadImg(file){await new Promise(r=>setTimeout(r,900));return URL.createObjectURL(file)}
}

const sCol=s=>s==="in_stock"?"#4ade80":s==="low_stock"?"#fbbf24":"#fb7185";
const sLbl=(s,t)=>s==="in_stock"?t.ins:s==="low_stock"?t.low:t.oos;
const buildWA=(p,st,t)=>{
  const price=p.da?disc(p.price,p.dp):p.price;
  const msg=(st.tpl||"Hi, order:\nProduct: {name}\nCode: {code}\nPrice: {price}").replace("{name}",p.name).replace("{code}",p.code).replace("{price}","$"+fp(price));
  return`https://wa.me/${st.wa||"1234567890"}?text=${encodeURIComponent(msg)}`;
};

    name:pr?.name||"",desc:pr?.desc||"",price:pr?.price||"",

          <div className="field"><label>{t.price}</label><input className="inp" type="number" step="0.01" value={f.price} onChange={e=>set("price",e.target.value)} placeholder="0.00"/></div>
          <div className="field"><label>{t.stSt}</label>
            <select className="sel" value={f.status} onChange={e=>set("status",e.target.value)}>

    <div className="table-wrap">
      <table className={`tbl ${isR?"tbl-rtl":""}`}>
        <thead><tr><th>Product</th><th>Price</th><th>Discount</th><th>Status</th><th>Vis.</th><th>Action</th></tr></thead>
        <tbody>
          {prods.map(p=>{
            const dp=p.da?disc(p.price,p.dp):null;
            return<tr key={p.id}>
              <td><div style={{display:"flex",alignItems:"center",gap:12}}>
                {p.imgs?.[0]&&<img src={p.imgs[0]} alt="" className="ithumb"/>}
                <div><div style={{fontWeight:600}}>{p.name}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{p.code}</div></div>
              </div></td>
              <td>
                {dp?<><span style={{color:"var(--gold2)",fontWeight:700,fontSize:15}}>${fp(dp)}</span>
                  {" "}<span style={{fontSize:12,color:"var(--text3)",textDecoration:"line-through"}}>${fp(p.price)}</span></>
                :<span style={{fontWeight:600}}>${fp(p.price)}</span>}
              </td>
              <td>{p.da?<span className="tag t-red">{p.dp}%</span>:<span style={{color:"var(--text3)"}}>—</span>}</td>
              <td><STag status={p.status}/></td>
              <td>{p.vis?<Ic n="eye" s={16} c="#4ade80"/>:<Ic n="eyeOff" s={16} c="var(--text3)"/>}</td>
              <td><button className="btn btn-ghost btn-xs" onClick={()=>{setEditing(p);setOpen(true)}}><Ic n="edit" s={13}/> Edit</button></td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>
    {open&&<EditModal pr={editing} cats={cats} onClose={()=>setOpen(false)} role={user?.role}/>}
  </ALayout>;
};

/* ── ADD/DELETE ────────────────────────────── */
const AddPg=()=>{
  const{prods,cats,t,user}=useApp();
  const[addO,setAddO]=useState(false);
  const[delC,setDelC]=useState(null);
  if(!["owner","developer"].includes(user?.role))return<ALayout active="add-product"><div style={{color:"var(--rose)",fontSize:18,fontFamily:"var(--fd)"}}>{t.accDen}</div></ALayout>;
  return<ALayout active="add-product">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
      <div className="page-title" style={{marginBottom:0}}><Ic n="plus" s={24} c="var(--gold2)"/>{t.addPg}</div>
      <button className="btn btn-gold" onClick={()=>setAddO(true)}><Ic n="plus" s={15} c="#1a1200"/>{t.addN}</button>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {prods.map(p=>(
        <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderRadius:"var(--r2)",background:"linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01))",border:"1px solid var(--edge2)",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12,minWidth:0}}>
            {p.imgs?.[0]&&<img src={p.imgs[0]} alt="" className="ithumb"/>}
            <div style={{minWidth:0}}>
              <div style={{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{p.code} · {p.cat}</div>
            </div>
          </div>
          <button className="btn btn-danger btn-sm" onClick={()=>setDelC(p.id)} style={{flexShrink:0}}><Ic n="trash" s={13} c="var(--rose)"/>{t.del}</button>
        </div>
      ))}
    </div>
    {addO&&<EditModal pr={null} cats={cats} onClose={()=>setAddO(false)} role={user?.role}/>}
    {delC&&<div className="modal-bg">
      <div className="modal" style={{maxWidth:400,animation:"scaleUp .22s cubic-bezier(.2,.8,.3,1)"}}>
        <div className="modal-title"><Ic n="trash" s={20} c="var(--rose)"/>Confirm Delete</div>
        <div className="modal-gold-bar" style={{background:"linear-gradient(to right,var(--rose),transparent)"}}/>
        <p style={{color:"var(--text2)",marginBottom:24,lineHeight:1.75}}>{t.confDel}</p>
        <div className="end">
          <button className="btn btn-ghost" onClick={()=>setDelC(null)}>{t.cancel}</button>
          <button className="btn btn-danger" onClick={async()=>{await db.delProduct(delC);setDelC(null)}}><Ic n="trash" s={13} c="var(--rose)"/>{t.del}</button>
        </div>
      </div>
    </div>}
  </ALayout>;
};

/* ── CATEGORIES ────────────────────────────── */
const CatPg=()=>{
  const{cats,t,user}=useApp();
  const[nc,setNc]=useState("");
  const[sav,setSav]=useState(false);
  if(!["owner","developer"].includes(user?.role))return<ALayout active="categories"><div style={{color:"var(--rose)",fontSize:18,fontFamily:"var(--fd)"}}>{t.accDen}</div></ALayout>;
  const add=async()=>{if(!nc.trim())return;setSav(true);await db.addCat(nc.trim());setNc("");setSav(false)};
  return<ALayout active="categories">
    <div className="page-title"><Ic n="tag" s={24} c="var(--gold2)"/>{t.catPg}</div>
    <div style={{maxWidth:500}}>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <input className="inp" placeholder={t.catN} value={nc} onChange={e=>setNc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:1}}/>
        <button className="btn btn-gold" onClick={add} disabled={sav||!nc.trim()}><Ic n="plus" s={15} c="#1a1200"/>{t.addCat}</button>
      </div>
      {cats.length===0?<div className="no-items" style={{minHeight:120}}><Ic n="tag" s={36} c="var(--text3)"/><p>{t.nocat}</p></div>:(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {cats.map(c=>(
            <div key={c} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderRadius:"var(--r2)",background:"linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01))",border:"1px solid var(--edge2)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><Ic n="tag" s={15} c="var(--gold2)"/><span style={{fontWeight:500}}>{c}</span></div>
              <button className="btn btn-danger btn-sm" onClick={()=>db.delCat(c)}><Ic n="trash" s={13} c="var(--rose)"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  </ALayout>;
};

/* ── SETTINGS ──────────────────────────────── */
const SettingsPg=()=>{
  const{st:settings,t,user}=useApp();
  const[f,setF]=useState({...settings});
  const[sav,setSav]=useState(false);
  const[saved,setSaved]=useState(false);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  useEffect(()=>setF({...settings}),[settings]);
  if(!["owner","developer"].includes(user?.role))return<ALayout active="store-settings"><div style={{color:"var(--rose)",fontSize:18,fontFamily:"var(--fd)"}}>{t.accDen}</div></ALayout>;
  const save=async()=>{setSav(true);await db.updSettings(f);setSav(false);setSaved(true);setTimeout(()=>setSaved(false),2500)};
  const SC=({title,icon,children})=>(
    <div className="section-card">
      <div className="section-card-title"><Ic n={icon} s={15} c="var(--gold2)"/>{title}</div>
      {children}
    </div>
  );
  return<ALayout active="store-settings">
    <div className="page-title"><Ic n="cog" s={24} c="var(--gold2)"/>{t.stgPg}</div>
    <div style={{maxWidth:640}}>
      <SC title="Store Identity" icon="store">
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div className="field"><label>Store Name</label><input className="inp" value={f.sn||""} onChange={e=>set("sn",e.target.value)}/></div>
          <div className="field"><label>{t.banTxt}</label><input className="inp" value={f.tag||""} onChange={e=>set("tag",e.target.value)}/></div>
          <div className="field"><label>{t.logoURL}</label><input className="inp" placeholder="https://…" value={f.logo||""} onChange={e=>set("logo",e.target.value)}/></div>
          <div className="field"><label>{t.banURL}</label><input className="inp" placeholder="https://…" value={f.banner||""} onChange={e=>set("banner",e.target.value)}/></div>
        </div>
      </SC>
      <SC title="WhatsApp Settings" icon="wa">
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div className="field"><label>{t.waNum} (no +)</label><input className="inp" placeholder="1234567890" value={f.wa||""} onChange={e=>set("wa",e.target.value)}/></div>
          <div className="field">
            <label>{t.waTpl}</label>
            <textarea className="ta" style={{fontFamily:"monospace",fontSize:13,minHeight:110}} value={f.tpl||""} onChange={e=>set("tpl",e.target.value)}/>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>Variables: {"{name}"} {"{code}"} {"{price}"}</div>
          </div>
        </div>
      </SC>
      <button className="btn btn-gold" onClick={save} disabled={sav} style={{padding:"14px 32px",fontSize:15}}>
        {sav?<span className="spin" style={{width:18,height:18}}/>:saved?<><Ic n="check" s={16} c="#1a1200"/>Saved!</>:<><Ic n="check" s={16} c="#1a1200"/>{t.saveSt}</>}
      </button>
    </div>
  </ALayout>;
};

/* ── APP ROOT ──────────────────────────────── */
function App(){
  const[lang,setLangR]=useState(()=>localStorage.getItem("luxe_lang")||"en");
  const[page,setPage]=useState("store");
  const[user,setUser]=useState(()=>db.getUser());
  const[prods,setProds]=useState([]);
  const[cats,setCats]=useState([]);
  const[st,setSt]=useState(DEF_ST);
  const t=TX[lang];
  const setLang=useCallback(l=>{setLangR(l);localStorage.setItem("luxe_lang",l)},[]);
  useEffect(()=>{
    const u1=db.onProducts(setProds);
    const u2=db.onCats(setCats);
    const u3=db.onSettings(setSt);
    return()=>{u1();u2();u3()};
  },[]);
  useEffect(()=>{document.documentElement.dir=t.dir;document.documentElement.lang=lang;},[lang,t.dir]);
  const ctx={lang,setLang,t,page,setPage,user,setUser,prods,cats,st};
  const pages={
    store:<StorePage/>,login:<LoginPage/>,stock:<StockPg/>,
    "products-admin":<ProdsPg/>,"add-product":<AddPg/>,
    categories:<CatPg/>,"store-settings":<SettingsPg/>,
  };
  return<Ctx.Provider value={ctx}>{pages[page]||<StorePage/>}</Ctx.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
